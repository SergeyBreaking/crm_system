{% extends 'base.html' %}
{% block content %}
<style>
    .manager-menu-container {
        max-width: 500px;
        margin: 0 auto;
        padding: 20px;
        padding-top: 150px;
    }
    
    .logo-icon {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 120px;
        margin: 0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
    }
    
    .logo-icon a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        text-decoration: none;
    }
    
    .logo-icon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 50%;
        cursor: pointer;
    }
    
    .menu-title {
        text-align: center;
        font-size: 24px;
        font-weight: 500;
        color: #333;
        margin-bottom: 40px;
    }
    
    .menu-buttons {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    
    .menu-button {
        background: #514D4A;
        color: white;
        padding: 25px 30px;
        border-radius: 20px;
        text-align: center;
        text-decoration: none;
        font-size: 18px;
        font-weight: 500;
        transition: background 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    
    .menu-button:hover {
        background: #3d3a38;
    }
    
    .menu-button-icon {
        font-size: 24px;
    }
    
    @media (min-width: 768px) {
        .manager-menu-container {
            max-width: 600px;
            padding-top: 90px;
        }
    }
</style>

<!-- Иконка - фиксированная -->
<div class="logo-icon">
    <a href="{{ url_for('main') }}">
        <img src="{{ url_for('uploaded_file', filename='logo.png') }}" alt="Logo">
    </a>
</div>

<div class="manager-menu-container">
    <h1 class="menu-title">Статистика менеджера</h1>
    
    <div class="menu-buttons">
        <a href="{{ url_for('manager_stats') }}" class="menu-button">
            <span class="menu-button-icon">💰</span>
            <span>Бонусы</span>
        </a>
        <a href="{{ url_for('channels') }}" class="menu-button">
            <span class="menu-button-icon">📊</span>
            <span>Каналы продаж</span>
        </a>
    </div>
</div>
{% endblock %}
